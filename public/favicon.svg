<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="brandGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#60a5fa" />
      <stop offset="45%" stop-color="#818cf8" />
      <stop offset="100%" stop-color="#a855f7" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  <!-- Dark background -->
  <rect width="32" height="32" rx="6" fill="#0B0F19" />
  <!-- Tradiglo candlestick chart brand mark, scaled to fit 32x32 -->
  <g filter="url(#glow)" transform="translate(4, 4) scale(0.235)">
    <g fill="url(#brandGrad)">
      <!-- Dotted Trendline -->
      <path d="M 0 116 Q 40 116 90 80" fill="none" stroke="url(#brandGrad)" stroke-width="5" stroke-linecap="round" stroke-dasharray="2 16" opacity="0.7" />
      <!-- Candlestick 1 (Lowest) -->
      <rect x="20" y="100" width="8" height="32" rx="3" />
      <rect x="14" y="108" width="20" height="16" rx="5" />
      <!-- Candlestick 2 (Middle) -->
      <rect x="44" y="84" width="8" height="36" rx="3" />
      <rect x="38" y="92" width="20" height="20" rx="5" />
      <!-- Candlestick 3 (Highest) -->
      <rect x="68" y="68" width="8" height="32" rx="3" />
      <rect x="62" y="76" width="20" height="16" rx="5" />
      <!-- Spark accent -->
      <path d="M 76 66 Q 76 74 84 74 Q 76 74 76 82 Q 76 74 68 74 Q 76 74 76 66 Z" />
    </g>
  </g>
</svg>
