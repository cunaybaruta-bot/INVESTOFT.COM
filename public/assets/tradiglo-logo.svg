<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 200" width="100%" height="100%">
  <defs>
    <!-- Unified Brand Gradient (Left to Right) -->
    <linearGradient id="brandGrad" x1="85" y1="0" x2="500" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#60a5fa" />
      <stop offset="45%" stop-color="#818cf8" />
      <stop offset="100%" stop-color="#a855f7" />
    </linearGradient>

    <!-- Background Atmospheric Glows -->
    <radialGradient id="bg-glow-left" cx="30%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#60a5fa" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#60a5fa" stop-opacity="0" />
    </radialGradient>
    
    <radialGradient id="bg-glow-right" cx="70%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#a855f7" stop-opacity="0.12" />
      <stop offset="100%" stop-color="#a855f7" stop-opacity="0" />
    </radialGradient>

    <!-- Subtle Vignette Overlay -->
    <radialGradient id="vignette" cx="50%" cy="50%" r="75%">
      <stop offset="50%" stop-color="#0B0F19" stop-opacity="0" />
      <stop offset="100%" stop-color="#0B0F19" stop-opacity="0.8" />
    </radialGradient>

    <!-- Technical Grid Pattern -->
    <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M 30 0 L 0 0 0 30" fill="none" stroke="#ffffff" stroke-opacity="0.02" stroke-width="1" />
    </pattern>

    <!-- Premium Multi-Layered Glow Filter -->
    <filter id="logo-glow" x="-20%" y="-20%" width="140%" height="140%">
      <!-- Ambient wide glow -->
      <feGaussianBlur in="SourceGraphic" stdDeviation="16" result="blurLg" />
      <feComponentTransfer in="blurLg" result="glowLg">
        <feFuncA type="linear" slope="0.3" />
      </feComponentTransfer>
      
      <!-- Core tight glow -->
      <feGaussianBlur in="SourceGraphic" stdDeviation="5" result="blurSm" />
      <feComponentTransfer in="blurSm" result="glowSm">
        <feFuncA type="linear" slope="0.5" />
      </feComponentTransfer>
      
      <!-- Composite layers -->
      <feMerge>
        <feMergeNode in="glowLg" />
        <feMergeNode in="glowSm" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- ================= BACKGROUND ================= -->
  <rect width="100%" height="100%" fill="#0B0F19" />
  <rect width="100%" height="100%" fill="url(#grid)" />
  <circle cx="150" cy="100" r="200" fill="url(#bg-glow-left)" pointer-events="none" />
  <circle cx="450" cy="100" r="250" fill="url(#bg-glow-right)" pointer-events="none" />
  <rect width="100%" height="100%" fill="url(#vignette)" pointer-events="none" />

  <!-- ================= BRAND MARK ================= -->
  <g filter="url(#logo-glow)">
    
    <!-- 1. CHART ICON (Left Side) -->
    <g fill="url(#brandGrad)">
      <!-- Dotted Trendline -->
      <path d="M 85 116 Q 125 116 175 80" fill="none" stroke="url(#brandGrad)" stroke-width="2.5" stroke-linecap="round" stroke-dasharray="1 8" opacity="0.7" />
      
      <!-- Candlestick 1 (Lowest) -->
      <rect x="105" y="100" width="4" height="32" rx="2" />
      <rect x="99" y="108" width="16" height="16" rx="4" />
      
      <!-- Candlestick 2 (Middle) -->
      <rect x="129" y="84" width="4" height="36" rx="2" />
      <rect x="123" y="92" width="16" height="20" rx="4" />
      
      <!-- Candlestick 3 (Highest) -->
      <rect x="153" y="68" width="4" height="32" rx="2" />
      <rect x="147" y="76" width="16" height="16" rx="4" />

      <!-- Spark / Glow Accent -->
      <path d="M 161 66 Q 161 74 169 74 Q 161 74 161 82 Q 161 74 153 74 Q 161 74 161 66 Z" />
    </g>

    <!-- 2. WORDMARK "TRADIGLO" (Right Side) -->
    <!-- Custom geometric vector typography for perfect rendering -->
    <g fill="url(#brandGrad)">
      <!-- T -->
      <path d="M 183 80 H 211 V 88 H 201 V 120 H 193 V 88 H 183 Z" />
      
      <!-- R -->
      <path d="M 221 80 H 241 A 12 12 0 0 1 253 92 A 12 12 0 0 1 244 103.6 L 254 120 H 244 L 235 104 H 229 V 120 H 221 Z M 229 88 H 239 A 4 4 0 0 1 243 92 A 4 4 0 0 1 239 96 H 229 Z" />
      
      <!-- A -->
      <path d="M 278 80 H 286 L 300 120 H 291 L 288 110 H 276 L 273 120 H 264 Z M 278 102 H 286 L 282 88 Z" />
      
      <!-- D -->
      <path d="M 310 80 H 326 A 20 20 0 0 1 346 100 A 20 20 0 0 1 326 120 H 310 Z M 318 88 V 112 H 326 A 12 12 0 0 0 338 100 A 12 12 0 0 0 326 88 Z" />
      
      <!-- I -->
      <path d="M 356 80 H 364 V 120 H 356 Z" />
      
      <!-- G -->
      <path d="M 394 80 A 20 20 0 1 0 414 100 V 96 H 396 V 104 H 405.5 A 12 12 0 1 1 394 88 A 11.5 11.5 0 0 1 404 93 L 410 87 A 20 20 0 0 0 394 80 Z" />
      
      <!-- L -->
      <path d="M 424 80 H 432 V 112 H 450 V 120 H 424 Z" />
      
      <!-- O -->
      <path d="M 480 80 A 20 20 0 1 0 480 120 A 20 20 0 1 0 480 80 Z M 480 88 A 12 12 0 1 1 480 112 A 12 12 0 1 1 480 88 Z" />
    </g>
    
  </g>
</svg>